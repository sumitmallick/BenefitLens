{{/*
Kubernetes Secret for sensitive credentials.

In production these values come from External Secrets Operator (ESO) reading from
AWS Secrets Manager, so the values here are intentionally empty strings. ESO will
reconcile the actual values into this Secret object after chart install.

If you are NOT using ESO, pass values via --set secrets.DATABASE_URL=... at deploy
time, or inject via a CI secret (never commit real credentials to values.yaml).
*/}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "claims-system.fullname" . }}-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "claims-system.labels" . | nindent 4 }}
  annotations:
    # Prevents accidental deletion via helm uninstall (keeps data safe)
    helm.sh/resource-policy: keep
type: Opaque
data:
  DATABASE_URL: {{ .Values.secrets.DATABASE_URL | b64enc | quote }}
  PHI_ENCRYPTION_KEY: {{ .Values.secrets.PHI_ENCRYPTION_KEY | b64enc | quote }}
  REDIS_URL: {{ .Values.secrets.REDIS_URL | b64enc | quote }}
