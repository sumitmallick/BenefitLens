{{- if .Values.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "claims-system.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "claims-system.labels" . | nindent 4 }}
  annotations:
    {{- with .Values.serviceAccount.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
    {{- if .Values.serviceAccount.irsaRoleArn }}
    # IRSA — allows this pod to assume the specified IAM role via OIDC federation.
    # The role must have the EKS cluster's OIDC provider as a trusted entity
    # with condition: sub == system:serviceaccount:<namespace>:<sa-name>
    eks.amazonaws.com/role-arn: {{ .Values.serviceAccount.irsaRoleArn | quote }}
    {{- end }}
automountServiceAccountToken: {{ .Values.serviceAccount.automountToken | default false }}
{{- end }}
