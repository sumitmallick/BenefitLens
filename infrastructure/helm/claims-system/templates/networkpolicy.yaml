{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "claims-system.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "claims-system.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "claims-system.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress

  ingress:
    # Allow HTTP traffic only from the ingress-nginx controller namespace.
    # All other inbound connections are silently dropped.
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.networkPolicy.ingressControllerNamespace | default "ingress-nginx" }}
      ports:
        - protocol: TCP
          port: 8000

  egress:
    # Allow DNS resolution (kube-dns lives in kube-system on port 53)
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53

    # Allow outbound to PostgreSQL
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: {{ .Values.networkPolicy.postgresPort | default 5432 }}

    # Allow outbound to Redis
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: {{ .Values.networkPolicy.redisPort | default 6379 }}

    # Allow outbound to Kafka (PLAINTEXT and TLS ports)
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: {{ .Values.networkPolicy.kafkaPort | default 9092 }}
        - protocol: TCP
          port: 9093
{{- end }}
