apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "claims-system.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "claims-system.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "claims-system.selectorLabels" . | nindent 6 }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        {{- include "claims-system.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      annotations:
        # Force pod restart when ConfigMap or Secret content changes
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "claims-system.serviceAccountName" . }}
      # Pod-level security context — runs all containers as non-root UID 1000
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      # Spread pods across nodes to tolerate single-node failure
      affinity:
        podAntiAffinity:
          # Required during scheduling — do not place two pods on the same node
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  {{- include "claims-system.selectorLabels" . | nindent 18 }}
              topologyKey: kubernetes.io/hostname
        {{- with .Values.affinity }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      terminationGracePeriodSeconds: 60
      containers:
        - name: {{ .Chart.Name }}
          image: {{ include "claims-system.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          # Container-level security context — lock down the filesystem
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          # Non-secret config from ConfigMap
          envFrom:
            - configMapRef:
                name: {{ include "claims-system.fullname" . }}-config
          # Secrets injected individually for explicit control
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "claims-system.fullname" . }}-secrets
                  key: DATABASE_URL
            - name: PHI_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "claims-system.fullname" . }}-secrets
                  key: PHI_ENCRYPTION_KEY
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "claims-system.fullname" . }}-secrets
                  key: REDIS_URL
            # Expose pod metadata for structured logging / tracing correlation
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
            successThreshold: 1
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 2
            successThreshold: 1
          startupProbe:
            # Allows up to 5 * 10 = 50 seconds for slow cold starts (e.g. DB migrations)
            httpGet:
              path: /health
              port: http
            failureThreshold: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            # Required for readOnlyRootFilesystem — processes that need /tmp
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
