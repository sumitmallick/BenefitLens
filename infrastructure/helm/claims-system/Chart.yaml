apiVersion: v2
name: claims-system
description: >
  HIPAA-compliant insurance claims adjudication platform.
  Packages the FastAPI backend with all supporting Kubernetes primitives:
  Deployment, Service, HPA, Ingress (NGINX + cert-manager TLS),
  ConfigMap, Secret, PodDisruptionBudget, ServiceAccount (IRSA-ready),
  and NetworkPolicy (default-deny).
type: application

# Chart version — bump on every change to the chart templates or values schema.
version: 0.2.0

# Application version — mirrors the Docker image tag that ships with this chart.
appVersion: "1.1.0"

keywords:
  - claims
  - insurance
  - healthcare
  - hipaa
  - adjudication

home: https://github.com/YOUR_ORG/claims-system

sources:
  - https://github.com/YOUR_ORG/claims-system

maintainers:
  - name: Sumit Kumar Mallick
    email: sumit@foliumlabs.net
    url: https://foliumlabs.net

dependencies: []

annotations:
  # Artifact Hub category for discoverability
  artifacthub.io/category: integration-delivery
  artifacthub.io/license: MIT
  artifacthub.io/containsSecurityUpdates: "false"
  artifacthub.io/changes: |
    - kind: added
      description: Helm templates (Deployment, Service, HPA, Ingress, ConfigMap, Secret, PDB, SA, NetworkPolicy)
    - kind: changed
      description: values.yaml extended with networkPolicy, pdb, serviceAccount, configmap sections
