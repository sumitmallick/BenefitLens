apiVersion: v1
kind: ServiceAccount
metadata:
  name: claims-backend-sa
  namespace: claims
  labels:
    app: claims-backend
    app.kubernetes.io/part-of: claims-processing
  annotations:
    # IRSA — EKS will inject temporary AWS credentials for this role into the pod.
    # Replace the ARN with the output of `terraform output eks_pod_role_arn`.
    #
    # The IAM role trust policy must contain:
    #   Principal: { Federated: <oidc-provider-arn> }
    #   Condition StringEquals:
    #     <oidc-url>:sub: "system:serviceaccount:claims:claims-backend-sa"
    #     <oidc-url>:aud: "sts.amazonaws.com"
    eks.amazonaws.com/role-arn: "arn:aws:iam::ACCOUNT_ID:role/claims-eks-pod-role"
    # Expire the OIDC token after 1 hour (AWS STS max session is 1 hour for IRSA)
    eks.amazonaws.com/token-expiration: "3600"
# Do NOT auto-mount the default service account token.
# The IRSA token is injected via a projected volume automatically by the EKS
# pod identity webhook — no explicit volumeMount required.
automountServiceAccountToken: false
