---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: claims-frontend
  namespace: claims
  labels:
    app: claims-frontend
    app.kubernetes.io/part-of: claims-processing
    version: v1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: claims-frontend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0    # zero-downtime deploys
  template:
    metadata:
      labels:
        app: claims-frontend
        version: v1
      annotations:
        prometheus.io/scrape: "false"   # Next.js does not expose /metrics by default
    spec:
      serviceAccountName: default
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001     # Next.js Docker image uses UID 1001 by convention
        runAsGroup: 1001
        fsGroup: 1001
        seccompProfile:
          type: RuntimeDefault
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values: [claims-frontend]
                topologyKey: kubernetes.io/hostname
      terminationGracePeriodSeconds: 30
      containers:
        - name: claims-frontend
          image: ghcr.io/YOUR_ORG/claims-frontend:latest
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          env:
            - name: NODE_ENV
              value: "production"
            - name: NEXT_PUBLIC_API_URL
              value: "https://api.claims.example.com"
            # Pod metadata for logging correlation
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 2
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            # Next.js writes .next/cache at runtime — needs a writable volume
            - name: next-cache
              mountPath: /app/.next/cache
      volumes:
        - name: tmp
          emptyDir: {}
        - name: next-cache
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: claims-frontend-svc
  namespace: claims
  labels:
    app: claims-frontend
    app.kubernetes.io/part-of: claims-processing
spec:
  type: ClusterIP
  selector:
    app: claims-frontend
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: http
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: claims-frontend-hpa
  namespace: claims
  labels:
    app: claims-frontend
    app.kubernetes.io/part-of: claims-processing
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: claims-frontend
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 120
