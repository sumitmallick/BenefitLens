global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    env: local
    app: claimsiq

# ── Alerting rules ─────────────────────────────────────────────────────────
rule_files:
  - /etc/prometheus/alerts.yml

# ── Scrape configs ────────────────────────────────────────────────────────
scrape_configs:

  # FastAPI backend — /metrics endpoint provided by prometheus-fastapi-instrumentator
  - job_name: claimsiq_backend
    static_configs:
      - targets: ["backend:8000"]
    metrics_path: /metrics
    scrape_interval: 10s

  # Prometheus self-monitoring
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  # Redis exporter (optional — uncomment when redis_exporter is running)
  # - job_name: redis
  #   static_configs:
  #     - targets: ["redis-exporter:9121"]

  # Postgres exporter (optional)
  # - job_name: postgres
  #   static_configs:
  #     - targets: ["postgres-exporter:9187"]
