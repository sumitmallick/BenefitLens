name: CI — Claims Processing System

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"

jobs:

  # ── Backend tests ───────────────────────────────────────────────────────
  backend-test:
    name: Backend — Lint, Type Check, Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: claims
          POSTGRES_PASSWORD: claims
          POSTGRES_DB: claimsdb_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U claims"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    defaults:
      run:
        working-directory: app/backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint (ruff)
        run: ruff check claims/ tests/

      - name: Type check (mypy)
        run: mypy claims/ --ignore-missing-imports

      - name: Run domain tests (no DB required)
        run: pytest tests/domain/ -v -m "not integration" --no-cov

      - name: Run database migrations
        env:
          DATABASE_URL_SYNC: postgresql://claims:claims@localhost:5432/claimsdb_test
        run: alembic upgrade head

      - name: Run API integration tests
        env:
          TEST_DATABASE_URL: postgresql+asyncpg://claims:claims@localhost:5432/claimsdb_test
          REDIS_URL: redis://localhost:6379/0
          PHI_ENCRYPTION_KEY: ""
        run: pytest tests/api/ tests/integration/ -v --cov=claims --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: app/backend/coverage.xml
          flags: backend

  # ── Frontend tests ──────────────────────────────────────────────────────
  frontend-test:
    name: Frontend — Type Check, Lint, Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: app/frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: app/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000

  # ── Docker build ────────────────────────────────────────────────────────
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./app/backend
          file: ./infrastructure/docker/Dockerfile.backend
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/claims-backend:${{ github.sha }}
            ghcr.io/${{ github.repository }}/claims-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./app/frontend
          file: ./infrastructure/docker/Dockerfile.frontend
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/claims-frontend:${{ github.sha }}
            ghcr.io/${{ github.repository }}/claims-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Deploy to K8s ────────────────────────────────────────────────────────
  deploy:
    name: Deploy — Helm upgrade
    runs-on: ubuntu-latest
    needs: [docker-build]
    if: github.ref == 'refs/heads/main'
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Configure kubectl
        uses: azure/k8s-set-context@v3
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBECONFIG }}

      - name: Deploy via Helm
        run: |
          helm upgrade --install claims-system ./infrastructure/helm/claims-system \
            --namespace claims \
            --create-namespace \
            --set image.tag=${{ github.sha }} \
            --set secrets.DATABASE_URL="${{ secrets.DATABASE_URL }}" \
            --set secrets.PHI_ENCRYPTION_KEY="${{ secrets.PHI_ENCRYPTION_KEY }}" \
            --set secrets.REDIS_URL="${{ secrets.REDIS_URL }}" \
            --wait \
            --timeout 5m

      - name: Run post-deploy smoke test
        run: |
          sleep 30
          curl -f https://api.claims.example.com/health || exit 1
