<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Background -->
  <rect width="200" height="200" rx="36" fill="url(#grad)"/>

  <!-- Document body -->
  <rect x="52" y="32" width="96" height="120" rx="8" fill="white" opacity="0.95"/>

  <!-- Folded corner -->
  <path d="M124 32 L148 56 L124 56 Z" fill="url(#grad)" opacity="0.25"/>
  <path d="M124 32 L148 56" stroke="white" stroke-width="1.5" opacity="0.4"/>

  <!-- Content lines -->
  <rect x="66" y="72" width="68" height="6" rx="3" fill="#1e40af" opacity="0.2"/>
  <rect x="66" y="86" width="48" height="6" rx="3" fill="#1e40af" opacity="0.2"/>

  <!-- Checkmark circle -->
  <circle cx="100" cy="122" r="22" fill="#2563eb" opacity="0.12"/>
  <circle cx="100" cy="122" r="22" stroke="#2563eb" stroke-width="2" opacity="0.3"/>

  <!-- Checkmark -->
  <path d="M89 122 L97 131 L113 113"
        stroke="#2563eb"
        stroke-width="4.5"
        stroke-linecap="round"
        stroke-linejoin="round"/>

  <!-- Gradient definition -->
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="200" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1e40af"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
  </defs>
</svg>
